<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts - Poppins (similar ao Netflix) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="style/responsive.css">
    <title>Netflix - Recriação para Aprendizado</title>
</head>
<body>
    <!-- CABEÇALHO - Similar ao Netflix real -->
    <header class="site-header">
        <div class="header-container">
            <!-- Logo Netflix -->
            <div class="logo">NETFLIX</div>
            
            <!-- Menu de navegação -->
            <nav class="nav-menu">
                <button class="nav-btn" data-filter="all">Início</button>
                <button class="nav-btn" data-filter="série">Séries</button>
                <button class="nav-btn" data-filter="filme">Filmes</button>
                <button class="nav-btn" data-filter="add">+ Adicionar</button>
            </nav>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main-content">
        <!-- SEÇÃO DESTAQUE - Filme em grande -->
        <section id="hero" class="hero-section">
            <div class="hero-content">
                <!-- Imagem de fundo do filme (carregada via JS) -->
            </div>
            
            <!-- Informações do filme em destaque -->
            <div class="hero-info">
                <h1 id="hero-title">Carregando...</h1>
                <p id="hero-summary">Aguarde...</p>
                <div class="hero-buttons">
                    <button id="play-btn" class="btn btn-play">▶ ASSISTIR</button>
                    <button id="info-btn" class="btn btn-info">ⓘ MAIS INFORMAÇÕES</button>
                </div>
            </div>
        </section>

        <!-- SEÇÃO DE FILMES/SÉRIES -->
        <section class="content-section">
            <div id="movies-container" class="movies-grid">
                <!-- Filmes/séries carregados via JavaScript -->
            </div>
        </section>
    </main>

    <!-- MODAL - Detalhes do filme/série -->
    <div id="details-modal" class="modal" aria-hidden="true">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
            <button id="close-modal-btn" class="modal-close" aria-label="Fechar">✕</button>
            <h2 id="modal-title">Título</h2>
            <p id="modal-summary">Resumo...</p>
            <p id="modal-details">Detalhes...</p>
        </div>
    </div>

    <!-- SCRIPT PRINCIPAL - Carregamento e interatividade -->
    <script src="js/app.js"></script>
</body>
</html>
